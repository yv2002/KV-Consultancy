<div class="text-center mb-5">

  <h5>🇮🇹 KV Consultancy</h5>

  <p>
    Admissions • Visa Support • Accommodation Assistance
  </p>

</div>
<section class="contact-section">

  <div class="container">

    <div class="row justify-content-center">

      <div class="col-lg-8">

        <div class="contact-card">

          <div class="text-center mb-4">

            <h1>Get Free Consultation</h1>

            <p class="subtitle">
              Start your journey to study in Italy with expert guidance.
            </p>

          </div>

          <form>

            <div class="row">

              <div class="col-md-6 mb-3">
                <label>Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  name="name"
                  [(ngModel)]="form.name">
              </div>

              <div class="col-md-6 mb-3">
                <label>Email</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  [(ngModel)]="form.email">
              </div>

            </div>

            <div class="row">

              <div class="col-md-6 mb-3">
                <label>Phone Number</label>
                <input
                  type="text"
                  class="form-control"
                  name="phone"
                  [(ngModel)]="form.phone">
              </div>

              <div class="col-md-6 mb-3">
                <label>Interested Program</label>
                <input
                  type="text"
                  class="form-control"
                  name="program"
                  [(ngModel)]="form.program">
              </div>

            </div>

            <div class="mb-4">
              <label>Your Message</label>
              <textarea
                rows="5"
                class="form-control"
                name="message"
                [(ngModel)]="form.message">
              </textarea>
            </div>

            <div class="text-center">

              <button
                type="button"
                class="btn submit-btn"
                (click)="sendEmail()">

                Send Inquiry

              </button>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

</section>
